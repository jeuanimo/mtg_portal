{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Quick Schedule{% endblock title %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-lightning"></i> Quick Schedule</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">Quickly schedule a meeting with default settings.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-calendar-plus"></i> Schedule Meeting
                            </button>
                            <a href="{% url 'meetings:meeting_create' %}" class="btn btn-outline-secondary">
                                Full Meeting Form
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
