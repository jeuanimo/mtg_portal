{% extends "base_dashboard.html" %}
{% load crispy_forms_tags %}
{% block title %}Notification Settings{% endblock title %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">Notification Settings</h1>
            <p class="text-muted mb-0">Choose how you want to hear from us.</p>
        </div>
        <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Back to Profile</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">{% crispy form %}</div>
    </div>
{% endblock content %}
