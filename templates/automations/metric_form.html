{% extends "base_dashboard.html" %}
{% load crispy_forms_tags %}
{% block title %}Add Metric - {{ campaign.name }} - MTG Portal{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'automations:dashboard' %}">Automations</a></li>
            <li class="breadcrumb-item"><a href="{% url 'automations:campaign_detail' campaign.pk %}">{{ campaign.name }}</a></li>
            <li class="breadcrumb-item active">Add Metric</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Record Campaign Metric</h5>
                </div>
                <div class="card-body">
                    {% crispy form %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
