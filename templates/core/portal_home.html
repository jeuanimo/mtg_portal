{% extends "base_dashboard.html" %}
{% block title %}Portal Home{% endblock %}
{% block content %}
    <div class="card border-0 shadow-sm">
        <div class="card-body p-5 text-center">
            <h1 class="h3 mb-3">Welcome to the Portal</h1>
            <p class="text-muted mb-4">
                Use the dashboard and navigation to access your account, projects, meetings, and tickets.
            </p>
            <div class="d-flex gap-2 justify-content-center">
                <a href="{% url 'dashboard:index' %}" class="btn btn-primary">Go to Dashboard</a>
                <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">View Profile</a>
            </div>
        </div>
    </div>
{% endblock %}
