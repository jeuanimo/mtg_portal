{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Quick Invoice{% endblock title %}
{% block content %}
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">
                            <i class="bi bi-lightning"></i> Quick Invoice
                        </h4>
                    </div>
                    <div class="card-body">
                        <p class="text-muted mb-4">
                            Create a simple one-line invoice quickly. For more detailed invoices, use the
                            <a href="{% url 'invoicing:invoice_create' %}">full invoice form</a>.
                        </p>
                        <form method="post">
                            {% csrf_token %}
                            {% crispy form %}
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
