{% extends "base_dashboard.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Organization{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">{{ action }} Organization</h1>
            <p class="text-muted mb-0">Manage company records and related details.</p>
        </div>
        <a href="{% if organization %}{% url 'crm:organization_detail' organization.pk %}{% else %}{% url 'crm:organization_list' %}{% endif %}"
           class="btn btn-outline-secondary">Cancel</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">{% crispy form %}</div>
    </div>
{% endblock %}
