{% extends "base_dashboard.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Lead{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">{{ action }} Lead</h1>
            <p class="text-muted mb-0">Capture or update sales pipeline details.</p>
        </div>
        <a href="{% if lead %}{% url 'crm:lead_detail' lead.pk %}{% else %}{% url 'crm:lead_list' %}{% endif %}"
           class="btn btn-outline-secondary">Cancel</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">{% crispy form %}</div>
    </div>
{% endblock %}
