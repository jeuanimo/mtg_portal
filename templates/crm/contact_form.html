{% extends "base_dashboard.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Contact{% endblock title %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">{{ action }} Contact</h1>
            <p class="text-muted mb-0">Manage contact information for CRM records.</p>
        </div>
        <a href="{% if contact %}{% url 'crm:contact_detail' contact.pk %}{% else %}{% url 'crm:contact_list' %}{% endif %}"
           class="btn btn-outline-secondary">Cancel</a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">{% crispy form %}</div>
    </div>
{% endblock content %}
